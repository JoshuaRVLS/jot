name: Linux Binary

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  ARTIFACT_NAME: jot-linux-x86_64

jobs:
  build-linux-binary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            ccache \
            pkg-config \
            libpython3-dev \
            libvterm-dev \
            libtermkey-dev \
            libuv1-dev \
            libutf8proc-dev \
            libtree-sitter-dev

      - name: Configure
        run: |
          cmake -S "${GITHUB_WORKSPACE}" \
                -B "${GITHUB_WORKSPACE}/build" \
                -G Ninja \
                -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
                -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/dist/${ARTIFACT_NAME}" \
                -DJOT_TREESITTER=ON

      - name: Build
        run: cmake --build "${GITHUB_WORKSPACE}/build" --parallel 2

      - name: Test
        run: ctest --test-dir "${GITHUB_WORKSPACE}/build" --output-on-failure

      - name: Install staging tree
        run: cmake --install "${GITHUB_WORKSPACE}/build"

      - name: Package tarball
        run: |
          cd "${GITHUB_WORKSPACE}/dist"
          tar -czf "${ARTIFACT_NAME}.tar.gz" "${ARTIFACT_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ github.workspace }}/dist/${{ env.ARTIFACT_NAME }}.tar.gz
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/dist/${{ env.ARTIFACT_NAME }}.tar.gz
